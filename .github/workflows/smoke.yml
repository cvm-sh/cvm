name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shell:
          - bash
          - zsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install zsh
        if: matrix.shell == 'zsh'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run smoke test
        run: ./test/smoke.sh
        shell: ${{ matrix.shell }}
