name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run tests
        run: bash ./test/run.sh

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="cvm-${VERSION}/" \
            -o "dist/cvm-${VERSION}.tar.gz" \
            HEAD
          git archive \
            --format=zip \
            --prefix="cvm-${VERSION}/" \
            -o "dist/cvm-${VERSION}.zip" \
            HEAD
          sha256sum dist/* > dist/sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cvm-*.tar.gz
            dist/cvm-*.zip
            dist/sha256.txt
          generate_release_notes: true
